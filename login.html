<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Access | Devashish Pathak</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;">

    <!-- Animated Mesh Background -->
    <div class="mesh-bg">
        <div class="mesh-circle circle-1"></div>
        <div class="mesh-circle circle-2"></div>
        <div class="mesh-circle circle-3"></div>
    </div>

    <div class="project-card fade-in-up" style="width: 100%; max-width: 400px; text-align: center;">
        <h2 style="margin-bottom: 2rem;">Authenticating...</h2>
        <form id="login-form">
            <input type="password" id="password" class="minimal-input" placeholder="Secure Access Token" autofocus
                autocomplete="off" style="margin-bottom: 2rem; text-align: center;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Enter Terminal</button>
        </form>
        <p id="error-msg" style="color: var(--primary); margin-top: 1.5rem; opacity: 0; transition: opacity 0.3s; font-weight: 700;">
            Access Denied. Signature mismatch.</p>
    </div>

    <script src="js/script.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (window.login) {
                await window.login();
            } else {
                alert("Authentication module not loaded yet.");
            }
        });
    </script>
</body>

</html>
