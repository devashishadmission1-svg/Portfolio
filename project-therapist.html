<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Therapist | Voice Assistant</title>
    <meta name="description" content="An empathetic AI voice assistant for mental health support.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .therapist-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }

        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.05);
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.5s var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 3rem 0;
            position: relative;
            box-shadow: var(--shadow-neon);
        }

        .mic-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 40px var(--primary-glow);
            transform: scale(1.05);
        }

        .mic-btn.listening {
            animation: pulse-ring 2s infinite;
            background: var(--primary);
            color: white;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 30px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            min-height: 1.5em;
        }

        .transcript {
            margin-top: 2rem;
            max-width: 700px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }
    </style>
</head>

<body>

    <!-- Animated Mesh Background -->
    <div class="mesh-bg">
        <div class="mesh-circle circle-1"></div>
        <div class="mesh-circle circle-2"></div>
        <div class="mesh-circle circle-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="logo">DEVASHISH.</a>
            <ul class="nav-links">
                <li><a href="index.html#projects">Work</a></li>
                <li><a href="ai-workshop.html" class="btn-res">AI Workshop</a></li>
            </ul>
        </div>
    </nav>

    <header class="section" style="padding-bottom: 2rem; text-align: center;">
        <div class="container fade-in-up">
            <h1 class="hero-title">AI Therapist</h1>
            <p class="hero-subtitle" style="margin: 0 auto;">A compassionate voice assistant powered by empathetic logic.</p>
        </div>
    </header>

    <section class="section" style="padding-top: 2rem;">
        <div class="container therapist-container animate-on-scroll">
            <div id="mic-btn" class="mic-btn">
                <span id="mic-icon">🎙️</span>
            </div>

            <p id="status" class="status-text">Click the catalyst to begin vocalization.</p>
            <div id="transcript-container" class="transcript" style="display: none;">
                <p id="transcript"></p>
            </div>

            <div class="skills-list" style="margin-top: 4rem; justify-content: center;">
                <li>Web Speech API</li>
                <li>NLP Synthesis</li>
                <li>Empathy Logic</li>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Compassion Project. Reserved for Devashish Pathak.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Simple mock logic for the therapist demo
        const micBtn = document.getElementById('mic-btn');
        const status = document.getElementById('status');
        const transcriptContainer = document.getElementById('transcript-container');
        const transcript = document.getElementById('transcript');
        let isListening = false;

        micBtn.addEventListener('click', () => {
            isListening = !isListening;
            if (isListening) {
                micBtn.classList.add('listening');
                status.textContent = "Synthesizing input... speak now.";
                transcriptContainer.style.display = 'block';
                transcript.textContent = "Listening to your thoughts...";
            } else {
                micBtn.classList.remove('listening');
                status.textContent = "Analysis complete. Waiting for catalyst.";
                transcript.textContent = "The session has concluded. I am here when you need me.";
            }
        });
    </script>
</body>

</html>
