<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Devashish Pathak</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Animated Mesh Background -->
    <div class="mesh-bg">
        <div class="mesh-circle circle-1"></div>
        <div class="mesh-circle circle-2"></div>
        <div class="mesh-circle circle-3"></div>
    </div>

    <!-- Premium Nav -->
    <nav class="navbar scrolled">
        <div class="container">
            <a href="index.html" class="logo">PORT. <span class="highlight">ADMIN</span></a>
            <ul class="nav-links">
                <li><a href="index.html">View Site</a></li>
                <li><a href="#" onclick="logout()" class="btn-res">Sign Out</a></li>
            </ul>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="dashboard-container fade-in-up">
                
                <div class="dashboard-header">
                    <h2 class="section-title">Control Center</h2>
                    <p style="opacity: 0.6; margin-top: -2rem; text-align: center; margin-bottom: 3rem;">
                        Manage your digital garden and portfolio assets with a premium interface.
                    </p>
                </div>

                <!-- Stats Overview -->
                <div class="stats-overview">
                    <div class="stat-card">
                        <h4>Total Posts</h4>
                        <div class="value" id="count-blog">0</div>
                    </div>
                    <div class="stat-card">
                        <h4>Gallery Assets</h4>
                        <div class="value" id="count-gallery">0</div>
                    </div>
                    <div class="stat-card">
                        <h4>Last Update</h4>
                        <div class="value" style="font-size: 1.1rem; opacity: 0.8;" id="last-update">Just now</div>
                    </div>
                </div>

                <div class="dashboard-tabs" style="display: flex; justify-content: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border-subtle);">
                    <button class="tab-btn active" onclick="switchTab('blog')">Post Content</button>
                    <button class="tab-btn" onclick="switchTab('gallery')">Media Library</button>
                </div>

                <!-- Blog Tab -->
                <div id="tab-blog" class="tab-content active">
                    <form id="blog-form">
                        <div style="display: grid; grid-template-columns: 1fr; gap: 1rem;">
                            <input type="text" id="blog-title" class="minimal-input" placeholder="Article Title" required>
                            <textarea id="blog-content" class="minimal-textarea" rows="12" placeholder="Start writing your AI insights..."
                                required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;">Publish to Garden</button>
                    </form>
                </div>

                <!-- Gallery Tab -->
                <div id="tab-gallery" class="tab-content">
                    <form id="gallery-form">
                        <div style="background: rgba(2,6,23,0.03); padding: 4rem; border-radius: 20px; border: 2px dashed var(--border-subtle); text-align: center; margin-bottom: 2rem; transition: border-color 0.3s;"
                             onmouseover="this.style.borderColor='var(--primary)'" 
                             onmouseout="this.style.borderColor='var(--border-subtle)'">
                            <label for="img-file" style="cursor: pointer;">
                                <div style="font-size: 3rem; margin-bottom: 1rem;">📁</div>
                                <span style="opacity: 0.7; font-weight: 600;">Click to upload (Max 500KB)</span>
                                <input type="file" id="img-file" class="minimal-input" accept="image/*" required style="display: none;">
                            </label>
                            <div id="file-name" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--primary); font-weight: 700;"></div>
                        </div>
                        <input type="text" id="img-caption" class="minimal-input" placeholder="Add a descriptive caption">
                        <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;">Archive to Gallery</button>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Admin Portal. Reserved for Devashish Pathak.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Check Auth using localStorage for better persistence
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'index.html';
        }

        // Stats Logic
        function updateStats() {
            const posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
            const images = JSON.parse(localStorage.getItem('galleryImages')) || [];
            document.getElementById('count-blog').textContent = posts.length;
            document.getElementById('count-gallery').textContent = images.length;
        }
        updateStats();

        // Tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(`tab-${tab}`).classList.add('active');
            const btns = document.querySelectorAll('.tab-btn');
            if (tab === 'blog') btns[0].classList.add('active');
            else btns[1].classList.add('active');
        }

        // File name display
        document.getElementById('img-file').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || "";
            document.getElementById('file-name').textContent = fileName;
        });

        // BLOG POST
        document.getElementById('blog-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('blog-title').value;
            const content = document.getElementById('blog-content').value;
            const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const id = Date.now().toString();

            const newPost = { id, title, content, date };
            const posts = JSON.parse(localStorage.getItem('blogPosts')) || [];
            posts.push(newPost);
            localStorage.setItem('blogPosts', JSON.stringify(posts));

            alert('Article successfully published!');
            e.target.reset();
            updateStats();
        });

        // GALLERY IMAGE
        document.getElementById('gallery-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('img-file');
            const caption = document.getElementById('img-caption').value;
            const file = fileInput.files[0];

            if (file) {
                if (file.size > 500 * 1024) {
                    alert('File exceeds 500KB limit.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function (event) {
                    const base64String = event.target.result;
                    const newImg = { url: base64String, caption };
                    const images = JSON.parse(localStorage.getItem('galleryImages')) || [];
                    images.push(newImg);
                    try {
                        localStorage.setItem('galleryImages', JSON.stringify(images));
                        alert('Visual asset successfully archived!');
                        e.target.reset();
                        document.getElementById('file-name').textContent = "";
                        updateStats();
                    } catch (err) {
                        alert('Storage quota exceeded.');
                    }
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>

</html>
